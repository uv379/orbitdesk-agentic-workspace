# ==============================================================================
# alembic.ini — Alembic database migration configuration
# ==============================================================================
#
# WHAT IS ALEMBIC?
#   Alembic is the database migration tool for SQLAlchemy.
#   When you change a model (add a column, rename a field), Alembic generates
#   a Python script that updates the DB schema safely — no data loss.
#
# HOW TO USE:
#   # Inside the auth-service directory (or container):
#
#   # Create your first migration (auto-detects model changes):
#   alembic revision --autogenerate -m "initial tables"
#
#   # Apply all pending migrations to the DB:
#   alembic upgrade head
#
#   # Roll back the last migration:
#   alembic downgrade -1
#
#   # See current DB revision:
#   alembic current
# ==============================================================================

[alembic]
# Where migration scripts are stored.
script_location = alembic

# The DB URL is overridden in alembic/env.py using the DATABASE_URL env var.
# This value here is just a placeholder — it's never used at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
