# ==============================================================================
# ci.yml — Continuous Integration: lint, typecheck, and test on every push/PR
# ==============================================================================
#
# WHEN DOES THIS RUN?
#   - On every push to any branch
#   - On every pull request targeting main
#
# WHAT DOES IT DO?
#   1. Checks out the code
#   2. Installs Node.js dependencies
#   3. Runs TypeScript type checking (catches type errors before runtime)
#   4. Runs ESLint (catches code style + bug-prone patterns)
#   5. Runs tests (if they exist)
#
# AFFECTED-ONLY STRATEGY:
# In a monorepo, you don't want to lint ALL services on every commit.
# If only api-gateway changed, only build + check api-gateway.
# This workflow uses a simple path filter approach — you can upgrade to
# Turborepo or Nx for smarter affected detection as the project grows.
# ==============================================================================

name: CI

on:
  push:
    branches: ["**"]             # run on every branch push
  pull_request:
    branches: [main]             # run on PRs targeting main

jobs:
  # ── Detect which apps changed ────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      # Each output is "true" or "false" — used by downstream jobs to skip work
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      packages:    ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      # dorny/paths-filter detects which files changed in this push/PR
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'apps/api-gateway/**'
            packages:
              - 'packages/**'

  # ── Lint + typecheck api-gateway ─────────────────────────────────────────────
  check-api-gateway:
    name: api-gateway — lint & typecheck
    needs: changes
    # Only run this job if api-gateway files (or shared packages) changed
    if: needs.changes.outputs.api-gateway == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-gateway   # all commands run in this directory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci                           # ci = clean install (uses package-lock.json)

      - name: TypeScript typecheck
        # tsc --noEmit checks types WITHOUT writing output files (faster)
        run: npx tsc --noEmit

      # Uncomment when you add ESLint config to the project:
      # - name: ESLint
      #   run: npx eslint src --ext .ts

      # Uncomment when you add tests (Jest):
      # - name: Tests
      #   run: npm test -- --passWithNoTests

  # ── Lint + typecheck shared packages ─────────────────────────────────────────
  check-packages:
    name: packages — typecheck
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest

    strategy:
      # Run checks for each package in parallel
      matrix:
        package: [ui, sdk]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit
