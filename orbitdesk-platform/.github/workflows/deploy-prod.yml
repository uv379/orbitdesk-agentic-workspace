# ==============================================================================
# deploy-prod.yml — Deploy to production on a published GitHub Release
# ==============================================================================
#
# WHEN DOES THIS RUN?
#   When you publish a Release on GitHub (e.g. tag v1.2.3).
#   This is intentional: production deploys are EXPLICIT and MANUAL.
#   Unlike dev (auto-deploy on every merge), prod requires a human to
#   create a release — giving you a chance to review what's going out.
#
# WHAT DOES IT DO?
#   1. Runs CI checks first (blocks deploy if checks fail)
#   2. Requires manual approval from a designated reviewer
#   3. Builds + pushes production Docker images tagged with the release version
#   4. Deploys to the production Kubernetes cluster
#   5. Verifies the rollout
#
# SECRETS REQUIRED (set in GitHub repo → Settings → Secrets → Actions):
#   KUBE_CONFIG_PROD — kubeconfig for the production cluster
#
# ENVIRONMENT PROTECTION RULES:
# Create a "production" environment in GitHub (repo → Settings → Environments).
# Add required reviewers — the "Wait for approval" step pauses until they approve.
# This is your last line of defense before production traffic is affected.
# ==============================================================================

name: Deploy to Production

on:
  release:
    types: [published]           # only fires when you PUBLISH a release (not draft)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Gate: run CI before deploying to prod ────────────────────────────────────
  ci-gate:
    name: CI checks must pass
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api-gateway/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # - run: npm test

  # ── Manual approval gate ──────────────────────────────────────────────────────
  approval:
    name: Wait for production approval
    needs: ci-gate
    runs-on: ubuntu-latest
    # "production" is a GitHub Environment with required reviewers configured.
    # The job pauses here until a reviewer approves in the GitHub Actions UI.
    environment: production
    steps:
      - name: Approved
        run: echo "Production deploy approved for release ${{ github.event.release.tag_name }}"

  # ── Build production images ───────────────────────────────────────────────────
  build:
    name: Build & push production images
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag with the release version (e.g. v1.2.3) AND "latest".
      # The version tag is immutable — great for rollbacks.
      # "latest" always points to the current production version.
      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: apps/api-gateway
          file: apps/api-gateway/Dockerfile
          push: true
          # Use --platform to build multi-arch images if you have ARM nodes
          # platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:latest

  # ── Deploy to production cluster ─────────────────────────────────────────────
  deploy:
    name: Deploy to production cluster
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Roll out with the version-tagged image (not "latest") so we know exactly
      # what version is running — critical for debugging and rollbacks.
      - name: Roll out api-gateway
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:${{ github.event.release.tag_name }} \
            -n orbitdesk

      # Wait up to 5 minutes for all pods to become healthy
      - name: Verify rollout
        run: kubectl rollout status deployment/api-gateway -n orbitdesk --timeout=300s

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Production deploy complete"
          echo "   Release:  ${{ github.event.release.tag_name }}"
          echo "   Image:    ${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:${{ github.event.release.tag_name }}"

      # If the new pods fail their readiness probes, rollback automatically.
      # This reverts to the previous ReplicaSet — zero manual intervention needed.
      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "❌ Rollout failed — initiating automatic rollback"
          kubectl rollout undo deployment/api-gateway -n orbitdesk
          kubectl rollout status deployment/api-gateway -n orbitdesk --timeout=120s
          echo "↩️  Rollback complete"
