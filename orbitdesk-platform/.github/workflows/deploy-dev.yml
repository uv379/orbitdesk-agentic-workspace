# ==============================================================================
# deploy-dev.yml — Auto-deploy to the dev environment on every push to main
# ==============================================================================
#
# WHEN DOES THIS RUN?
#   Automatically after every push to the `main` branch (e.g. after a PR is merged).
#
# WHAT DOES IT DO?
#   1. Builds Docker image for each changed service
#   2. Pushes image to GitHub Container Registry (ghcr.io)
#   3. Tags image with the git commit SHA (e.g. ghcr.io/org/api-gateway:a1b2c3d)
#   4. Updates the running dev Kubernetes deployment with the new image
#
# SECRETS REQUIRED (set in GitHub repo → Settings → Secrets → Actions):
#   KUBE_CONFIG_DEV   — base64-encoded kubeconfig for your dev cluster
#
# The GITHUB_TOKEN is provided automatically by GitHub Actions — no setup needed.
# It's used to push images to ghcr.io (GitHub Container Registry).
# ==============================================================================

name: Deploy to Dev

on:
  push:
    branches: [main]             # only fires on pushes to main (not feature branches)

env:
  REGISTRY: ghcr.io
  # github.repository is automatically "your-org/orbitdesk-platform"
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Build + Push api-gateway image ───────────────────────────────────────────
  build-api-gateway:
    name: Build & push api-gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write              # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the auto-provided GITHUB_TOKEN
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the image.
      # Tags it with both the commit SHA (immutable, for rollbacks)
      # and "dev-latest" (mutable, always points to the newest dev build).
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/api-gateway
          file: apps/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:dev-latest

  # ── Deploy to dev Kubernetes cluster ─────────────────────────────────────────
  deploy:
    name: Deploy to dev cluster
    needs: build-api-gateway       # wait for the image to be pushed first
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Decode the base64 kubeconfig and write it to ~/.kube/config
      # so kubectl can authenticate to the dev cluster
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Update the api-gateway deployment to use the new image.
      # kubectl set image triggers a rolling update — zero downtime.
      # container=api-gateway matches the container name in the Deployment YAML.
      - name: Roll out api-gateway
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.IMAGE_PREFIX }}/orbitdesk-api-gateway:${{ github.sha }} \
            -n orbitdesk

      # Wait for the rollout to complete (all pods healthy) before marking the job done.
      # If a pod fails its readiness probe, this command fails and the workflow is marked failed.
      - name: Verify rollout
        run: kubectl rollout status deployment/api-gateway -n orbitdesk --timeout=120s

      - name: Notify success
        if: success()
        run: echo "✅ api-gateway deployed to dev — image ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check rollout logs"
