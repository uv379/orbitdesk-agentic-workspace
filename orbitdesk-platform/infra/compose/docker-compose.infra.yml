# ==============================================================================
# docker-compose.infra.yml — Infrastructure services only
# ==============================================================================
#
# Contains: PostgreSQL, Redis, MinIO, Kafka, RabbitMQ, ZooKeeper
# Does NOT contain: any OrbitDesk application code
#
# WHY SEPARATE?
# You might want to start ONLY the infrastructure (for running services locally
# with `npm run start:dev` without Docker), or restart a specific infra container
# without touching the apps. Keeping infra separate makes this easy.
#
# Run infra alone:
#   docker compose \
#     -f infra/compose/docker-compose.base.yml \
#     -f infra/compose/docker-compose.infra.yml \
#     up
# ==============================================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orbitdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orbitdesk          # default DB; each service creates its own via migrations
    ports:
      - "5432:5432"                   # exposed so you can use TablePlus / DBeaver locally
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d orbitdesk"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - orbitdesk-network

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbitdesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"                   # exposed for RedisInsight / redis-cli locally
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - orbitdesk-network

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: orbitdesk-minio
    restart: unless-stopped
    # 'server /data' starts the object store
    # '--console-address :9001' starts the web UI on port 9001
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"                   # S3 API — services use this
      - "9001:9001"                   # MinIO web console — http://localhost:9001
    volumes:
      - minio_data:/data
    networks:
      - orbitdesk-network

  # ── ZooKeeper (required by Kafka) ─────────────────────────────────────────────
  # ZooKeeper manages Kafka broker metadata and leader election.
  # Kafka 3.x+ can run without ZooKeeper (KRaft mode) but bitnami's image
  # still defaults to ZooKeeper for stability. You can remove this and switch
  # to KRaft mode when you're comfortable with Kafka internals.
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: orbitdesk-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"    # fine for local dev, disable in production
    networks:
      - orbitdesk-network

  # ── Kafka (event streaming) ────────────────────────────────────────────────
  # Used for high-throughput async events:
  #   agent-service   → publishes agent run events
  #   audit-log       → all services publish audit events
  #   ml-pipeline     → publishes training job progress
  kafka:
    image: bitnami/kafka:3.6
    container_name: orbitdesk-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes" # disable TLS requirement for local dev
    ports:
      - "9092:9092"                   # exposed so you can use Kafka UI / CLI locally
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - orbitdesk-network

  # ── RabbitMQ (reliable task queues) ───────────────────────────────────────────
  # Used for: job dispatch that needs guaranteed delivery + retry logic.
  # BullMQ (in agent-service and workflow-service) can target either Redis or
  # RabbitMQ. Redis queues are simpler; RabbitMQ adds dead-letter queues,
  # priority queues, and federation if you ever need multi-region.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: orbitdesk-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: orbitdesk
      RABBITMQ_DEFAULT_PASS: ${POSTGRES_PASSWORD}   # reuse shared password for simplicity
    ports:
      - "5672:5672"                   # AMQP protocol — services connect here
      - "15672:15672"                 # Management UI — http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - orbitdesk-network
