# ==============================================================================
# docker-compose.base.yml — Shared network and volume definitions
# ==============================================================================
#
# This file is NEVER run alone. It is always merged with other compose files
# using Docker Compose's -f flag (multi-file merge).
#
# WHY A BASE FILE?
# docker-compose.infra.yml and docker-compose.dev.yml both need to put their
# containers on the same network so they can talk to each other.
# If each file defined its own network, Docker would create two separate networks
# and the services couldn't reach the infra containers. The base file defines
# the network and volumes ONCE, and both files reference them.
#
# HOW DOCKER COMPOSE FILE MERGING WORKS:
# When you pass multiple -f files, Docker Compose deep-merges them left to right.
# Keys in later files override keys in earlier files for the same service.
# Networks and volumes defined here become available to all merged files.
#
# Usage (via Makefile `make dev` or directly):
#   docker compose \
#     -f infra/compose/docker-compose.base.yml \
#     -f infra/compose/docker-compose.infra.yml \
#     -f infra/compose/docker-compose.dev.yml \
#     up
# ==============================================================================

networks:
  # All OrbitDesk containers join this network.
  # Inside this network, containers reach each other by service name.
  # Example: api-gateway → http://auth-service:3001 (no localhost, no IP)
  orbitdesk-network:
    driver: bridge

volumes:
  # Named volumes survive `docker compose down` — data persists between restarts.
  # Run `docker compose down -v` to delete them (destroys all stored data).

  postgres_data:   # PostgreSQL database files
  redis_data:      # Redis AOF/RDB persistence
  minio_data:      # MinIO object storage
  kafka_data:      # Kafka topic/offset data
  rabbitmq_data:   # RabbitMQ queue state
