# ==============================================================================
# deployments/api-gateway.yaml — Kubernetes Deployment for the API Gateway
# ==============================================================================
#
# WHAT IS A DEPLOYMENT?
# A Deployment tells Kubernetes: "always keep N copies of this container running."
# If a pod crashes, Kubernetes automatically restarts it.
# If you update the image, Kubernetes does a rolling update (no downtime).
#
# HOW SECRETS WORK HERE:
# Env vars marked secretKeyRef pull values from a Kubernetes Secret object.
# You create the secret ONCE with:
#   kubectl create secret generic orbitdesk-secrets \
#     --from-literal=jwt-secret=<value> \
#     --from-literal=anthropic-api-key=<value>
# The pod reads from it at runtime — the secret value never lives in this file.
#
# APPLY THIS FILE:
#   kubectl apply -f infra/k8s/deployments/api-gateway.yaml
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: orbitdesk           # all OrbitDesk resources live in this namespace
  labels:
    app: api-gateway
    component: backend
    version: "1.0"
spec:
  replicas: 2                    # run 2 pods for high availability
  selector:
    matchLabels:
      app: api-gateway           # this deployment manages pods with this label
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                # allow 1 extra pod during update (so traffic never drops)
      maxUnavailable: 0          # never kill a pod until the new one is healthy
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/orbitdesk-api-gateway:latest
          # ↑ Replace with your actual container registry image.
          # CI/CD (deploy-prod.yml) builds and pushes this image on each release.
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
              protocol: TCP

          env:
            - name: PORT
              value: "8000"
            - name: NODE_ENV
              value: "production"

            # JWT_SECRET is read from a Kubernetes Secret (not hardcoded here)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: orbitdesk-secrets
                  key: jwt-secret

            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: orbitdesk-config
                  key: cors-origin

            # Rate limiting
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX
              value: "100"

            # Downstream service URLs — in k8s, services resolve by their Service name
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: USER_SERVICE_URL
              value: http://user-service:3002
            - name: AGENT_SERVICE_URL
              value: http://agent-service:3003
            - name: AI_CORE_URL
              value: http://ai-core-service:3004
            - name: DOCUMENT_SERVICE_URL
              value: http://document-service:3005
            - name: WORKFLOW_SERVICE_URL
              value: http://workflow-service:3006
            - name: INTEGRATION_SERVICE_URL
              value: http://integration-service:3007
            - name: ML_PIPELINE_URL
              value: http://ml-pipeline-service:3008

          # Liveness probe: if this fails, Kubernetes RESTARTS the pod.
          # Calls GET /health/live — our HealthController always returns 200 when alive.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15   # wait 15s for the app to boot before first check
            periodSeconds: 20          # check every 20 seconds
            failureThreshold: 3        # restart after 3 consecutive failures

          # Readiness probe: if this fails, Kubernetes stops sending traffic to this pod.
          # Does NOT restart the pod — it just temporarily removes it from the load balancer.
          # Calls GET /health/ready — our HealthController pings downstream services.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Resource limits prevent one pod from consuming the entire node.
          # requests: minimum guaranteed resources (used for scheduling decisions)
          # limits:   hard cap (pod is killed if it exceeds memory limit)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"            # 100 millicores = 0.1 CPU
            limits:
              memory: "512Mi"
              cpu: "500m"            # 0.5 CPU max

      # If your container registry is private, create an image pull secret:
      # kubectl create secret docker-registry ghcr-secret \
      #   --docker-server=ghcr.io \
      #   --docker-username=<github-user> \
      #   --docker-password=<github-token>
      # Then uncomment:
      # imagePullSecrets:
      #   - name: ghcr-secret
